<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapCal | Rapid Event Scheduler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --purple: #9088E5;
            --lime: #CACED0;
            --border: #856522;
        }

        /* A4 Print Optimization */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            #calendar-container { width: 100%; border: none !important; }
            #calendar-grid { border: 2px solid var(--border); }
        }

        .month-title {
            color: var(--purple);
            -webkit-text-stroke: 1px black;
            font-weight: 900;
            text-transform: uppercase;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
        }

        .grid-cell { border: 1px solid var(--border); min-height: 100px; }
        .header-cell { background-color: var(--lime); color: black; font-weight: bold; border: 1px solid var(--border); }
    </style>
</head>
<body class="bg-gray-50 h-screen flex">

    <div class="w-1/3 p-8 bg-white border-r border-gray-200 no-print">
        <h1 class="text-3xl font-black mb-6" style="color: var(--purple);">SNAPCAL</h1>
        <textarea id="eventInput" class="w-full h-64 p-4 border-2 border-gray-300 rounded mb-4" 
            placeholder="YYYY-MM-DD - Event Name&#10;2026-06-15 - Design Sprint&#10;2026-06-20 - Client Demo"></textarea>
        <button onclick="window.print()" class="w-full bg-black text-white py-3 rounded font-bold hover:opacity-90">
            PRINT CALENDAR
        </button>
    </div>

    <div id="calendar-container" class="flex-1 p-8 overflow-auto">
        <div id="calendar-grid" class="grid grid-cols-[auto,repeat(7,1fr)] bg-white">
            <div class="row-span-6 flex items-center justify-center p-4" style="border: 2px solid var(--border);">
                <span class="month-title text-6xl tracking-tighter">JUNE 2026</span>
            </div>
            <div class="header-cell p-2 text-center">MON</div>
            <div class="header-cell p-2 text-center">TUE</div>
            <div class="header-cell p-2 text-center">WED</div>
            <div class="header-cell p-2 text-center">THU</div>
            <div class="header-cell p-2 text-center">FRI</div>
            <div class="header-cell p-2 text-center">SAT</div>
            <div class="header-cell p-2 text-center">SUN</div>
            
            <div id="days-container" class="contents"></div>
        </div>
    </div>

    <script>
        const input = document.getElementById('eventInput');
        const container = document.getElementById('days-container');

        function renderCalendar() {
            container.innerHTML = '';
            const events = input.value.split('\n').filter(line => line.includes('-'));
            
            // Generate 35 days (5 weeks)
            for (let i = 1; i <= 35; i++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'grid-cell p-2 relative';
                dayDiv.innerHTML = `<span class="font-bold">${i > 30 ? i - 30 : i}</span>`;
                
                // Simple parser logic
                events.forEach(event => {
                    if (event.includes(`2026-06-${String(i).padStart(2, '0')}`)) {
                        dayDiv.innerHTML += `<div class="mt-2 text-xs bg-lime-200 p-1 rounded border border-purple-400">${event.split('-').slice(3).join('-')}</div>`;
                    }
                });
                container.appendChild(dayDiv);
            }
        }

        input.addEventListener('input', renderCalendar);
        renderCalendar(); // Initial render
    </script>
</body>
</html>
