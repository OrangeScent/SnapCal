<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>SnapCal - Monthly Calendar Generator</title>
    <style>
        :root {
            --brand-purple: #8865E5; /* 根據您的設計稿調整 */
            --brand-lime: #CAC300;
            --border-color: #856522;
            --bg-color: #FAFAFA;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg-color);
            color: #000;
            padding: 40px;
        }

        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 350px 1fr; gap: 40px; }

        /* 幾何風格組件 */
        .card {
            background: #fff;
            border: 3px solid var(--border-color);
            padding: 24px;
            box-shadow: 8px 8px 0px rgba(133, 101, 34, 0.2);
        }

        h1 { text-transform: uppercase; color: var(--brand-purple); letter-spacing: -1px; }

        textarea {
            width: 100%; height: 250px; border: 2px solid var(--border-color);
            padding: 12px; font-family: monospace; margin-bottom: 20px;
        }

        button {
            width: 100%; height: 50px; background: var(--brand-lime);
            border: 2px solid var(--border-color); font-weight: 900; cursor: pointer;
            text-transform: uppercase; margin-bottom: 10px;
        }

        .secondary { background: var(--brand-purple); color: white; }

        /* 月曆網格 */
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            border-top: 3px solid var(--border-color);
            border-left: 3px solid var(--border-color);
        }

        .day-cell {
            height: 120px; border-right: 3px solid var(--border-color);
            border-bottom: 3px solid var(--border-color); padding: 5px;
        }

        .weekday-header { background: #eee; font-weight: 800; text-align: center; padding: 10px; }

        .event-item {
            font-size: 10px; padding: 2px 4px; margin-bottom: 2px;
            border-left: 4px solid rgba(0,0,0,0.2); background: #eee;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>SnapCal</h1>
            <p>批量匯入工作事項</p>
            <textarea id="eventInput" placeholder="範例：1/6-30/6 英文 (skipMath)"></textarea>
            <button onclick="generateCalendar()">生成月曆</button>
            <button class="secondary" onclick="window.print()">匯出 PDF</button>
        </div>

        <div id="calendarOutput">
            </div>
    </div>

    <script>
        // 這裡維持您原本的邏輯功能，僅需確保 generateCalendar 與 renderCalendars 函數存在
        function generateCalendar() {
            // 原有的解析邏輯...
            console.log("正在生成...");
        }
    </script>
</body>
</html>
